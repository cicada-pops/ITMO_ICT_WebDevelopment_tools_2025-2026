site_name: "Якшин Артемий — Web Development Tools"
site_description: "Отчеты по лабораторным работам курса Web Development Tools (ИТМО, K3340)"
site_url: "https://cicada-pops.github.io/ITMO_ICT_WebDevelopment_tools_2025-2026/"
repo_url: "https://github.com/cicada-pops/ITMO_ICT_WebDevelopment_tools_2025-2026"
repo_name: "cicada-pops/ITMO_ICT_WebDevelopment_tools_2025-2026"

docs_dir: students/k3340/Yakshin_Artemiy/docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: ru
  features:
    - navigation.expand
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - attr_list
  - def_list
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Лабораторная работа 1:
      - Обзор: lr_1/index.md
      - Практика 1.1: lr_1/practice_1_1.md
      - Практика 1.2: lr_1/practice_1_2.md
      - Практика 1.3: lr_1/practice_1_3.md
      - Финальная сборка: lr_1/lab_1.md
      - Структура проекта: lr_1/lab_1_structure.md
      - Модели данных: lr_1/lab_1_models.md
      - Подключение к БД: lr_1/lab_1_db.md
      - Эндпоинты: lr_1/lab_1_endpoints.md
      - Авторизация и JWT: lr_1/lab_1_auth.md
  - Лабораторная работа 2:
      - Обзор: lr_2/index.md
      - Задача 1 — сумма чисел: lr_2/task_1.md
      - Задача 2 — парсинг + БД: lr_2/task_2.md
      - Сводное сравнение: lr_2/summary.md
  - Лабораторная работа 3:
      - Обзор: lr_3/index.md
      - Упаковка в Docker: lr_3/docker.md
      - Сервис парсера: lr_3/parser.md
      - Очередь Celery: lr_3/queue.md
      - Проверка стенда: lr_3/verify.md
